<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>lab2-2504-149</title>
    <link rel="stylesheet" href="css/lab2-2504-149-index.css">
</head>
<body>

<!-- 头部：固定定位 + 浮动 -->
<div class="header">
    <div class="logo">
        <img src="img/logo.jpg" alt="logo">
    </div>
    <ul class="nav">
        <li>首页</li>
        <li>图书分类</li>
        <li>热门推荐</li>
        <li>新书上市</li>
    </ul>
</div>

<!-- 三栏主体布局 -->
<div class="container">
    <!-- 左侧：相对定位 -->
    <div class="left">
        <h3>图书分类</h3>
        <ul>
            <li>计算机</li>
            <li>文学小说</li>
            <li>历史传记</li>
            <li>教育学习</li>
        </ul>
    </div>

    <!-- 中间：父相子绝 + 悬停效果 -->
    <div class="middle">
        <div class="book-show">
            <img src="img/book1.jpg" alt="图书">
            <div class="hot-tag">热销中</div>
        </div>

        <div class="hot-list">
            <div class="item">热门1</div>
            <div class="item">热门2</div>
            <div class="item">热门3</div>
        </div>

        <table class="new-table">
            <tr>
                <td>书名</td>
                <td>价格</td>
            </tr>
            <tr>
                <td>新书1</td>
                <td>39元</td>
            </tr>
            <tr>
                <td>新书2</td>
                <td>49元</td>
            </tr>
        </table>
    </div>

    <!-- 右侧：固定定位 -->
    <div class="right">
        <h4>促销广告</h4>
        <img src="img/adv.jpg" alt="促销">
    </div>
</div>

</body>
</html>
