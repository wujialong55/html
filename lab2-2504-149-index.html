<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="css/lab2-2504-149-index.css">
</head>
<body>
<!-- 头部：固定定位 + 浮动 -->
<div class="header">
    <div class="logo">LOGO</div>
    <ul class="nav">
        <li>首页</li>
        <li>图书分类</li>
        <li>热门推荐</li>
        <li>联系我们</li>
    </ul>
</div>

<!-- 主体三栏浮动布局 -->
<div class="container">
    <!-- 左栏：相对定位 -->
    <div class="left">
        <h3>图书分类</h3>
        <ul>
            <li>计算机</li>
            <li>文学</li>
            <li>历史</li>
            <li>教育</li>
        </ul>
    </div>

    <!-- 中栏：父相子绝 + 悬停效果 -->
    <div class="middle">
        <div class="book-item">
            <img src="img/book1.jpg" alt="图书">
            <div class="tip">热销中</div>
        </div>
        <div class="hot">热门推荐（浮动）</div>
        <table class="new-book">
            <tr><td>新书1</td></tr>
            <tr><td>新书2</td></tr>
        </table>
    </div>

    <!-- 右栏：固定定位 -->
    <div class="right">促销广告</div>
</div>
</body>
</html>
