<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图书商城 Lab4</title>
  <!-- 必须引入Font Awesome，图标动画才能生效 -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- 引入CSS文件，路径必须正确 -->
  <link rel="stylesheet" href="css/lab4-2504-149-index.css">
</head>
<body>

<!-- 顶部导航栏 -->
<header class="header">
  <div class="container">
    <div class="logo">
      <img src="img/logo.png" alt="Logo">
      <span>书香阁</span>
    </div>
    <nav class="nav">
      <a href="#">首页</a>
      <a href="#">图书分类</a>
      <a href="#">新品上架</a>
      <a href="#">关于我们</a>
    </nav>
    <div class="icon-group">
      <i class="fa-solid fa-search search-icon"></i>
      <i class="fa-solid fa-cart-shopping cart-icon"></i>
      <button class="login-btn" id="openLogin">登录 / 注册</button>
    </div>
  </div>
</header>

<!-- 轮播图区域（修复高度与动画） -->
<div class="carousel">
  <div class="carousel-inner">
    <div class="carousel-item">
      <img src="img/carousel1.png" alt="轮播图1">
    </div>
    <div class="carousel-item">
      <img src="img/carousel2.png" alt="轮播图2">
    </div>
    <div class="carousel-item">
      <img src="img/carousel3.png" alt="轮播图3">
    </div>
  </div>
</div>

<!-- 主体内容 -->
<main class="main">
  <div class="container main-layout">
    <aside class="sidebar">
      <h3>图书分类</h3>
      <ul>
        <li><a href="#">文学小说</a></li>
        <li><a href="#">历史传记</a></li>
        <li><a href="#">科技编程</a></li>
        <li><a href="#">少儿绘本</a></li>
        <li><a href="#">考试教辅</a></li>
      </ul>
    </aside>

    <section class="content">
      <h2>热门推荐</h2>
      <div class="book-list">
        <div class="book-card">
          <img src="img/book1.png" alt="图书封面">
          <h4>JavaScript高级程序设计</h4>
          <p>￥69.00</p>
        </div>
        <div class="book-card">
          <img src="img/book2.png" alt="图书封面">
          <h4>HTML+CSS从入门到精通</h4>
          <p>￥59.00</p>
        </div>
        <div class="book-card">
          <img src="img/book3.png" alt="图书封面">
          <h4>深入理解计算机系统</h4>
          <p>￥99.00</p>
        </div>
      </div>
    </section>
  </div>
</main>

<!-- 登录注册弹窗 -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="form-box login-form" id="loginForm">
      <h2>欢迎登录</h2>
      <div class="input-group">
        <label>用户名</label>
        <input type="text" id="loginUser" placeholder="请输入用户名">
      </div>
      <div class="input-group">
        <label>密码</label>
        <input type="password" id="loginPwd" placeholder="请输入密码">
      </div>
      <button class="submit-btn" id="loginBtn">登录</button>
      <p class="toggle-txt">没有账号？
        <a href="javascript:;" id="goToReg">立即注册</a>
      </p>
    </div>

    <div class="form-box register-form" id="registerForm">
      <h2>用户注册</h2>
      <div class="input-group">
        <label>用户名</label>
        <input type="text" id="regUser" placeholder="设置用户名">
      </div>
      <div class="input-group">
        <label>密码</label>
        <input type="password" id="regPwd" placeholder="设置密码">
      </div>
      <div class="input-group">
        <label>确认密码</label>
        <input type="password" id="regPwd2" placeholder="再次输入密码">
      </div>
      <button class="submit-btn" id="registerBtn">注册</button>
      <p class="toggle-txt">已有账号？
        <a href="javascript:;" id="goToLogin">返回登录</a>
      </p>
    </div>
  </div>
</div>

<script>
  const modal = document.getElementById('modal');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');

  document.getElementById('openLogin').onclick = () => {
    modal.style.display = 'flex';
    loginForm.style.display = 'block';
    registerForm.style.display = 'none';
  };

  document.getElementById('goToReg').onclick = () => {
    loginForm.style.display = 'none';
    registerForm.style.display = 'block';
  };

  document.getElementById('goToLogin').onclick = () => {
    registerForm.style.display = 'none';
    loginForm.style.display = 'block';
  };

  window.onclick = (e) => {
    if (e.target === modal) modal.style.display = 'none';
  };

  // 注册逻辑
  document.getElementById('registerBtn').onclick = () => {
    const user = document.getElementById('regUser').value.trim();
    const pwd = document.getElementById('regPwd').value.trim();
    const pwd2 = document.getElementById('regPwd2').value.trim();

    if (!user || !pwd || !pwd2) {
      alert('请填写完整信息');
      return;
    }
    if (pwd !== pwd2) {
      alert('两次密码不一致');
      return;
    }

    let users = JSON.parse(localStorage.getItem('users')) || [];
    if (users.some(u => u.username === user)) {
      alert('用户名已存在');
      return;
    }

    users.push({ username: user, pwd });
    localStorage.setItem('users', JSON.stringify(users));
    alert('注册成功！');
    registerForm.style.display = 'none';
    loginForm.style.display = 'block';
  };

  // 登录逻辑
  document.getElementById('loginBtn').onclick = () => {
    const user = document.getElementById('loginUser').value.trim();
    const pwd = document.getElementById('loginPwd').value.trim();

    if (!user || !pwd) {
      alert('请输入用户名和密码');
      return;
    }

    const users = JSON.parse(localStorage.getItem('users')) || [];
    const find = users.find(u => u.username === user && u.pwd === pwd);

    if (find) {
      alert('登录成功！欢迎回来');
      modal.style.display = 'none';
    } else {
      alert('用户名或密码错误');
    }
  };
</script>
</body>
</html>
